<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Next-Gen AI Platform for Data Automation">
    <meta property="og:title" content="AI Data Automation Platform">
    <meta property="og:description" content="Premium, high-converting AI automation solutions.">
    
    <title>AI Platform Speed Run</title>
    
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <header>
    </header>

    <main>
        <section id="hero">
            <h1>Next-Gen AI Platform</h1>
        </section>

        <section id="features">
            <h2>Core Capabilities</h2>
            <div id="feature-grid">
            </div>
        </section>

        <section id="pricing">
            <h2>Pricing Plans</h2>
            
            <div class="controls">
                <select id="currency-select">
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="INR">INR (₹)</option>
                </select>
                
                <label>
                    <input type="checkbox" id="billing-toggle"> Annual Billing (20% Off)
                </label>
            </div>

            <div id="pricing-tiers">
                <div class="tier">
                    <h3>Starter</h3>
                    <p class="price-display" id="price-starter">...</p>
                </div>
                <div class="tier">
                    <h3>Pro</h3>
                    <p class="price-display" id="price-pro">...</p>
                </div>
                <div class="tier">
                    <h3>Enterprise</h3>
                    <p class="price-display" id="price-enterprise">...</p>
                </div>
            </div>
        </section>

        <section id="social-proof">
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
